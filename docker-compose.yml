services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: lgpd_user
      POSTGRES_PASSWORD: lgpd_password
      POSTGRES_DB: lgpd_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env.production
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend

volumes:
  db_data:
