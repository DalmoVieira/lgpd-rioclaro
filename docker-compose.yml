version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lgpd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lgpd
      POSTGRES_PASSWORD: lgpd_secret
      POSTGRES_DB: lgpd_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lgpd -d lgpd_db']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lgpd-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lgpd:lgpd_secret@postgres:5432/lgpd_db?schema=public
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: lgpd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  pgdata:
  uploads:
